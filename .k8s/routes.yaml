apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: webui-routes
  namespace: app3
  annotations:
    konghq.com/plugins: opentelemetry,prometheus
spec:
  parentRefs:
  - name: kong
    namespace: infra-gateway
  rules:  
  - matches:
    - path:
        type: Exact
        value: '/'
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: '/'
    backendRefs:
    - name: webui
      kind: Service
      port: 80
