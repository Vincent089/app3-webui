apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: webui-routes
  namespace: app3
  annotations:
    konghq.com/plugins: opentelemetry,prometheus
spec:
  parentRefs:
  - name: kong
    namespace: infra-gateway
  rules:  
  - matches:
    - path:
        type: PathPrefix
        value: '/'
    # Important to never use filters: URLRewrite here. This helps Kong proxy every app reload to the SPA router
    backendRefs:
    - name: webui
      kind: Service
      port: 80
