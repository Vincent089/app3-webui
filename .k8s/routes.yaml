apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: webui-routes
  namespace: app3
spec:
  parentRefs:
  - name: kong
    namespace: infra-gateway
  rules:  
  - matches:
    - path:
        type: PathPrefix
        value: '/'
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: '/'
    backendRefs:
    - name: webui
      kind: Service
      port: 80
